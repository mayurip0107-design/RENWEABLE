<!DOCTYPE html>
<html>

<head>
  <title>Purchase Now</title>

 
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    
    .header {
      background: #d8c3bc;
      color: white;
      text-align: center;
      padding: 80px 20px;
    }

    .header h1 {
      font-size: 60px;
    }

    .purchase-box {
      background: white;
      max-width: 500px;
      margin: 50px auto;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .purchase-box h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .btn-buy {
      background: #444;
      color: white;
      width: 100%;
      padding: 12px;
      border: none;
    }

    .btn-buy:hover {
      background: #222;
    }
  </style>
</head>

<body>

  
  <div class="header">
    <h1>Purchase Now</h1>
    <p>Get your beautiful template today</p>
  </div>

 
  <div class="purchase-box">

    <h2>Checkout</h2>

    <form>

      <div class="mb-3">
        <label>Your Name</label>
        <input type="text" class="form-control">
      </div>

      <div class="mb-3">
        <label>Email Address</label>
        <input type="email" class="form-control">
      </div>

      <div class="mb-3">
        <label>Select Plan</label>

        <select class="form-control">
          <option>Basic - $19</option>
          <option>Premium - $49</option>
          <option>Unlimited </option>
        </select>
      </div>

      <div class="mb-3">
        <label>Card Number</label>
        <input type="text" class="form-control">
      </div>

      <button class="btn-buy">
        BUY NOW
      </button>

    </form>

  </div>

</body>

</html>
